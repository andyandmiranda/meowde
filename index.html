function renderLeague(){const bots=[['Mina',180],['Yen',140],['Noa',112],['Jin',86],['Leo',43]]; const rows=[...bots,{0:'Me',1:S.xp}].map(x=>Array.isArray(x)?{n:x[0],xp:x[1]}:{n:x[0],xp:x[1]}).sort((a,b)=>b.xp-a.xp).map((r,i)=>`<div class="lrow"><span class="rank">${i+1}</span><span class="avatar">${esc(r.n[0])}</span><span class="name">${esc(r.n)}</span><span class="xp">${r.xp} XP</span></div>`).join(''); app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><div class="simple-head"><h2>${t('leagueTitle')}</h2><p>${t('leagueCopy')}</p></div><div class="lrows">${rows}</div></div>${tabs('league')}</div>`}
function renderRoom(){const names={a:['Soft Icon','가장 안전한 기본안'],b:['Dream Sticker','조금 더 말랑한 스티커형'],c:['Clean Mark','로고처럼 가장 세련된 안']}; const cards=['a','b','c'].map(k=>`<div class="cat-card"><div class="cat-card-head">${catSVG(k,'idle',88)}<div><h3>${names[k][0]}</h3><p>${names[k][1]}</p></div></div><button class="btn ${S.cat===k?'':'ghost'}" onclick="S.cat='${k}';save();renderRoom()">${S.cat===k?'Selected':t('select')}</button></div>`).join(''); app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><div class="simple-head"><h2>${t('roomTitle')}</h2><p>${t('roomCopy')}</p></div><div class="room-grid">${cards}</div></div>${tabs('room')}</div>`}
function langSheet(){overlay(`<h3>${t('chooseLang')}</h3><p>Meowde supports Korean and English lesson copy.</p><div class="grid2"><button class="btn" onclick="S.lang='ko';closeOverlay();renderHome()">한국어</button><button class="btn ghost" onclick="S.lang='en';closeOverlay();renderHome()">English</button></div>`)}
function overlay(html){let d=document.createElement('div');d.className='sheet';d.id='overlay';d.innerHTML=`<div class="panel">${html}</div>`;app.appendChild(d)}function closeOverlay(){const o=document.getElementById('overlay');if(o)o.remove()}function toast(msg){document.querySelectorAll('.toast').forEach(x=>x.remove());const d=document.createElement('div');d.className='toast';d.textContent=msg;app.appendChild(d);setTimeout(()=>d.remove(),2100)}
async function warmPy(){if(pyReady||pyLoading||typeof loadPyodide==='undefined')return;pyLoading=true; const origError=console.error, origWarn=console.warn; let warnCount=0;
 const filter=(...a)=>{const s=String(a[0]||''); if(s.includes('wasm instantiation failed')||s.includes('DataCloneError')||s.includes('URL object could not be cloned'))warnCount++; else origError(...a)};
 try{console.error=filter;console.warn=filter;pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.28.0/full/'});pyReady=true}catch(e){
 try{delete WebAssembly.instantiateStreaming;delete WebAssembly.compileStreaming;pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.28.0/full/'});pyReady=true}catch(e2){}}
 finally{console.error=origError;console.warn=origWarn;pyLoading=false;if(S.screen==='home')renderHome()}}
function useMilk(){return true}
function startDaily(){startLesson(Math.max(0,S.next-1),true)}
function startLesson(i,daily=false){if(!useMilk())return;S.lessonIndex=Math.max(0,Math.min(i,lessons().length-1));S.queue=lessons()[S.lessonIndex].exercises.map(e=>Object.assign({},e));S.idx=0;S.combo=0;S.maxCombo=0;S.firstTotal=S.queue.filter(e=>e.type!=='concept').length;S.firstCorrect=0;S.xpEarned=0;S.daily=!!daily;setup();save();renderLesson()}
function cur(){return S.queue[S.idx]}function setup(){S.sel=null;S.fill=null;S.checked=false;S.correct=false;S.loading=false;S.hint=false;S.output=''}
function renderLesson(){if(!hasLessonProgress())return renderHome();S.screen='lesson';save();const ex=cur(), L=lessons()[S.lessonIndex], pct=Math.round(S.idx/S.queue.length*100); let body='', qhead=''; if(ex.type!=='concept')qhead=`<div class="coach">${catSVG(S.cat,S.checked?(S.correct?'happy':'oops'):'focus',68)}<div class="bubble"><div class="prompt">${esc(ex.prompt)}</div>${S.hint?`<div class="hint">${esc(ex.hint)}</div>`:`<button class="hint" onclick="S.hint=true;renderLesson()">${t('hint')}</button>`}</div></div>`; if(ex.type==='concept'){qhead=`<div class="coach">${catSVG(S.cat,'idle',68)}<div class="bubble"><div class="prompt">${t('conceptCoach')}</div></div></div>`;body=`<div class="card"><h3>${esc(ex.title)}</h3><p style="font-size:14px;color:var(--muted);line-height:1.6;margin:8px 0 12px">${esc(ex.body)}</p><div class="code">${esc(ex.code)}</div></div>`} else if(ex.type==='predict'){body=`<div class="code">${esc(ex.code)}</div><div class="choices">${ex.choices.map((c,i)=>`<button class="choice ${S.sel===i?'sel':''} ${S.checked&&i===ex.answer?'right':''} ${S.checked&&S.sel===i&&i!==ex.answer?'wrong':''}" onclick="S.sel=${i};renderLesson()">${esc(c)}</button>`).join('')}</div>${S.checked&&S.correct?`<div class="console">${esc(ex.output)}</div>`:''}` } else if(ex.type==='fill'){body=`<div class="card fillcode">${esc(ex.code).replace('____',`<span class="blank ${S.fill?'filled':''}">${S.fill?esc(S.fill):''}</span>`)}</div><div class="tokens">${ex.tokens.map(tok=>`<button class="token ${S.fill===tok?'used':''}" onclick="S.fill='${esc(tok)}';renderLesson()">${esc(tok)}</button>`).join('')}</div>`} else if(ex.type==='bughunt'){body=`<div class="lines">${ex.lines.map((ln,i)=>`<button class="linebtn ${S.sel===i?'sel':''} ${S.checked&&i===ex.buggy?'right':''}" onclick="S.sel=${i};renderLesson()">${i+1}. ${esc(ln)}</button>`).join('')}</div>${S.checked?`<div class="fix">FIX: ${esc(ex.fixed)}</div>`:''}` } else if(ex.type==='write'){body=`<textarea class="codearea" spellcheck="false" oninput="S.write=this.value;save()">${esc(S.write||ex.starter)}</textarea><div class="pill" style="margin-top:10px">${esc(ex.testcase)}</div>${S.output?`<div class="console">${esc(S.output)}</div>`:''}`}
 const can = ex.type==='concept'||S.checked||S.loading?true:(ex.type==='predict'||ex.type==='bughunt'?S.sel!==null:ex.type==='fill'?!!S.fill:true); const foot= ex.type==='concept'?`<div class="lesson-foot"><button class="btn" onclick="nextQ()">${t('got')}</button></div>`:S.checked?`<div class="feedback ${S.correct?'ok':'no'}"><h3>${S.correct?t('correct'):t('wrong')}</h3><p>${esc(ex.explain)} ${!S.correct?t('tryAgain'):''}</p><button class="btn" onclick="nextQ()">${t('continue')}</button></div>`:`<div class="lesson-foot"><button class="btn" ${!can?'disabled':''} onclick="checkQ()">${ex.type==='write'?(S.loading?t('pyLoading'):t('run')):t('check')}</button></div>`; app.innerHTML=`<div class="screen"><div class="lesson-bg"></div>${brand()}<div class="lesson-top"><button class="close" onclick="renderHome()">×</button><div class="lesson-title"><b>${esc(L.title)}</b><div class="progress"><span style="width:${pct}%"></span></div></div><span class="pill">Combo ${S.combo}</span></div><div class="scroll"><main class="lesson-main">${qhead}${body}</main></div>${foot}</div>`}
async function runPython(code){await warmPy(); if(!pyodide) throw new Error('no pyodide'); pyodide.runPython('import sys, io\nsys.stdout = io.StringIO()'); try{pyodide.runPython(code)}catch(e){return 'ERROR: '+e.message} return pyodide.runPython('sys.stdout.getvalue()').trimEnd()}
async function checkQ(){const ex=cur(); let ok=false; if(ex.type==='predict')ok=S.sel===ex.answer; else if(ex.type==='fill')ok=S.fill===ex.answer; else if(ex.type==='bughunt')ok=S.sel===ex.buggy; else if(ex.type==='write'){S.loading=true;renderLesson(); let code=S.write||ex.starter; try{S.output=await runPython(code); ok=S.output.trim()===String(ex.expected).trim()}catch(e){S.output=t('engineError');ok=false}} S.loading=false;S.checked=true;S.correct=ok;if(ok){S.combo++;S.maxCombo=Math.max(S.maxCombo,S.combo);S.xpEarned+=(S.daily?20:10)+(S.combo>=3?5:0);S.firstCorrect++}else{S.combo=0; if(!ex.retry){S.queue.push(Object.assign({},ex,{retry:true}))}}renderLesson()}
function nextQ(){S.idx++;S.write=''; if(S.idx>=S.queue.length)return finish(); setup(); save(); renderLesson()}
function finish(){const finishedLessonIndex=S.lessonIndex, earned=S.xpEarned, maxCombo=S.maxCombo, acc=Math.round((S.firstCorrect/Math.max(1,S.firstTotal))*100);if(!S.done.includes(finishedLessonIndex)){S.done.push(finishedLessonIndex);S.done.sort((a,b)=>a-b);S.next=Math.min(lessons().length-1,S.done.length)}S.xp+=earned;S.churu+=earned;clearLessonProgress();S.lessonIndex=finishedLessonIndex;save();app.innerHTML=`<div class="screen"><div class="reward-screen">${catSVG(S.cat,'happy',116)}<h2>${t('lessonDone')}</h2><p class="pill">${esc(lessons()[finishedLessonIndex].title)}</p><div class="stats3"><div class="stat3"><b>+${earned}</b><p>XP</p></div><div class="stat3"><b>${acc}%</b><p>${t('accuracy')}</p></div><div class="stat3"><b>x${maxCombo}</b><p>${t('maxCombo')}</p></div></div></div><div class="lesson-foot"><button class="btn" onclick="renderMap()">${t('reward')}</button></div></div>`}
const app=document.getElementById('app');if(hasLessonProgress())renderLesson();else renderHome();if(!localStorage.getItem('meowde-v410-seen')){localStorage.setItem('meowde-v410-seen','1');setTimeout(()=>langSheet(),300)}
</script></body></html>
