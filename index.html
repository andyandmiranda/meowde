function icon(n){const d={lock:'M7 10V7a5 5 0 0 1 10 0v3M5 10h14v10H5z',home:'M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10.5z',map:'M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3zM9 3v15M15 6v15',league:'M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4zM5 6H3a3 3 0 0 0 3 3M19 6h2a3 3 0 0 1-3 3',room:'M4 20V8l8-5 8 5v12M8 20v-7h8v7',play:'M8 5v14l11-7z',check:'M20 6 9 17l-5-5',code:'M8 9l-4 3 4 3M16 9l4 3-4 3M14 5l-4 14',cat:'M5 12 7 5l5 4 5-4 2 7a7 7 0 1 1-14 0z',spark:'M12 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2z'}[n]||d.home;return `<svg class="ico" viewBox="0 0 24 24"><path d="${d}"/></svg>`}
function catSVG(kind='a',mood='idle',size=80){
 const palettes={a:['#FFF7EC','#43352F','#FFB6A2','#E7F8F0'],b:['#F7F2FF','#373145','#C7BAFF','#FFF2C7'],c:['#FFFDF8','#2F2B28','#96D9BD','#DDF4FF']};
 const p=palettes[kind]||palettes.a;
 const eyes={
  idle:'<ellipse cx="43" cy="56" rx="4.4" ry="5.6" fill="'+p[1]+'"/><ellipse cx="77" cy="56" rx="4.4" ry="5.6" fill="'+p[1]+'"/><circle cx="44.6" cy="53.8" r="1.7" fill="#fff"/><circle cx="78.6" cy="53.8" r="1.7" fill="#fff"/>',
  happy:'<path d="M38.5 52l8 4.2l-8 4.2M81.5 52l-8 4.2l8 4.2" fill="none" stroke="'+p[1]+'" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>',
  focus:'<path d="M39 56h10M71 56h10" fill="none" stroke="'+p[1]+'" stroke-width="4" stroke-linecap="round"/>',
  oops:'<ellipse cx="43" cy="56" rx="5" ry="6.4" fill="'+p[1]+'"/><ellipse cx="77" cy="56" rx="5" ry="6.4" fill="'+p[1]+'"/><circle cx="44.8" cy="53.4" r="1.9" fill="#fff"/><circle cx="78.8" cy="53.4" r="1.9" fill="#fff"/>'
 }[mood]||'';
 const nose='<path d="M56.8 64h6.4l-3.2 3.6z" fill="'+p[1]+'" stroke="'+p[1]+'" stroke-width="1.6" stroke-linejoin="round"/>';
 const mouth=mood==='oops'?'<path d="M55 74q5-4 10 0" fill="none" stroke="'+p[1]+'" stroke-width="3" stroke-linecap="round"/>':'<path d="M53.5 70.5q3.5 3.6 6.5 0q3.5 3.6 6.5 0" fill="none" stroke="'+p[1]+'" stroke-width="3" stroke-linecap="round"/>';
 const blush=(mood==='happy'||mood==='idle')?'<circle cx="31" cy="66" r="4.2" fill="'+p[2]+'" opacity="'+(mood==='happy'?'.6':'.35')+'"/><circle cx="89" cy="66" r="4.2" fill="'+p[2]+'" opacity="'+(mood==='happy'?'.6':'.35')+'"/>':'';
 const whisk='<g stroke="'+p[1]+'" stroke-width="2.2" stroke-linecap="round" opacity=".38"><path d="M23 63h15M23.5 69l15-3.3M97 63H82M96.5 69l-15-3.3"/></g>';
 return `<svg width="${size}" height="${size}" viewBox="0 0 120 112" aria-hidden="true"><g stroke="${p[1]}" stroke-linejoin="round"><path d="M28.5 42 37.5 18 56 35" fill="${p[0]}" stroke-width="4.5"/><path d="M91.5 42 82.5 18 64 35" fill="${p[0]}" stroke-width="4.5"/><path d="M37.5 30 41 22 48.5 34" fill="${p[2]}" stroke-width="2.5" opacity=".65"/><path d="M82.5 30 79 22 71.5 34" fill="${p[2]}" stroke-width="2.5" opacity=".65"/><path d="M23 60c0-23 17-38 37-38s37 15 37 38c0 22-15 35-37 35S23 82 23 60z" fill="${p[0]}" stroke-width="4.5"/></g>${eyes}${nose}${mouth}${blush}${whisk}</svg>`}

function brand(){return `<div class="top"><div class="brand"><span class="brand-mark">${catSVG(S.cat,'idle',38)}</span><div><h1>Meowde</h1><p>${t('tagline')}</p></div></div><button class="lang" onclick="langSheet()">${S.lang.toUpperCase()}</button></div>`}
function stats(){const treatLabel=S.lang==='ko'?'츄르':'Churu';return `<div class="status"><span class="pill">${t('progress')} ${S.done.length}/30</span><span class="pill">${S.xp} XP</span><span class="pill">${treatLabel} ${S.churu}</span><span class="pill">Milk ∞</span><span class="pill ${pyReady?'good':''}">${pyReady?t('pyReady'):(pyLoading?t('pyLoading'):t('pyCold'))}</span></div>`}
function tabs(active){return `<div class="tabbar"><button class="${active==='home'?'on':''}" onclick="renderHome()">${icon('home')}<span>${t('home')}</span></button><button class="${active==='map'?'on':''}" onclick="renderMap()">${icon('map')}<span>${t('map')}</span></button><button class="${active==='league'?'on':''}" onclick="renderLeague()">${icon('league')}<span>${t('league')}</span></button><button class="${active==='room'?'on':''}" onclick="renderRoom()">${icon('room')}<span>${t('room')}</span></button></div>`}
function renderHome(){S.screen='home'; save(); const hasProgress=hasLessonProgress(); const L=hasProgress?(lessons()[S.lessonIndex]||lessons()[0]):(lessons()[S.next]||lessons()[0]); const lessonNumber=hasProgress?S.lessonIndex+1:S.next+1; const mainAction=hasProgress?'resumeLesson()':`startLesson(${S.next})`; const mainLabel=hasProgress?(S.lang==='ko'?'이어하기':'Resume'):t('start'); const nextTitle=hasProgress?(S.lang==='ko'?'저장된 학습 지점':'Saved lesson'):t('next'); const openLabel=hasProgress?(S.lang==='ko'?'이어하기':'Resume'):t('open'); app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><section class="card hero">${catSVG(S.cat,'focus',96)}<div><h2>${t('homeTitle')}</h2><p>${t('homeCopy')}</p><div class="grid2"><button class="btn" onclick="${mainAction}">${icon('play')}${mainLabel}</button><button class="btn ghost" onclick="renderMap()">${icon('map')}${t('map')}</button></div></div></section><section class="card"><div class="section-title"><h3>${nextTitle}</h3><span class="pill">${String(lessonNumber).padStart(2,'0')}</span></div><div class="next-card"><span class="lesson-badge">${String(lessonNumber).padStart(2,'0')}</span><div class="lesson-info"><b>${esc(L.title)}</b><p>${hasProgress?(S.lang==='ko'?`문제 ${Math.min(S.idx+1,S.queue.length)} / ${S.queue.length}에서 이어서 시작해요.`:`Resume at step ${Math.min(S.idx+1,S.queue.length)} / ${S.queue.length}.`):esc(L.description)}</p></div><button class="btn small" onclick="${mainAction}">${openLabel}</button></div></section><section class="card"><div class="section-title"><h3>${t('daily')}</h3><span class="pill">+20 XP</span></div><p style="font-size:13.5px;color:var(--muted);line-height:1.55">${t('dailySub')}</p><button class="btn butter" style="margin-top:13px" onclick="startDaily()">${icon('code')}${t('run')}</button></section><section class="card"><div class="section-title"><h3>${t('quest')}</h3></div><div class="quest"><div class="qrow"><span class="qdot"></span><span class="qtxt">Lesson</span><div class="qbar"><span style="width:${Math.min(100,S.done.length/30*100)}%"></span></div></div><div class="qrow"><span class="qdot"></span><span class="qtxt">XP 50</span><div class="qbar"><span style="width:${Math.min(100,S.xp/50*100)}%"></span></div></div></div></section></div>${tabs('home')}</div>`}
function renderMap(){S.screen='map'; save(); const start=S.unit*10, XS=[50,26,50,74,50,26,50,74,50,26], STEP=106, TOP=64; const H=TOP+9*STEP+118;
 let stones='';
 for(let i=0;i<9;i++){const x1=XS[i],y1=TOP+i*STEP,x2=XS[i+1],y2=TOP+(i+1)*STEP; [0.28,0.5,0.72].forEach((tt,k)=>{const sx=x1+(x2-x1)*tt+(k===1?0:(k===0?-1.4:1.4)), sy=y1+(y2-y1)*tt; stones+=`<span class="stone" style="left:${sx}%;top:${sy}px"></span>`})}
 const deco=`<svg class="bush" style="left:6%;top:${TOP+STEP*0.5}px" width="52" height="34" viewBox="0 0 52 34"><circle cx="14" cy="22" r="12" fill="#CBEEDC"/><circle cx="30" cy="18" r="15" fill="#B8E7CF"/><circle cx="43" cy="24" r="9" fill="#CBEEDC"/></svg>
 <svg class="bush" style="left:78%;top:${TOP+STEP*2.4}px" width="46" height="40" viewBox="0 0 46 40"><path d="M23 2 40 30H6z" fill="#A9E0C2"/><rect x="20" y="30" width="6" height="8" rx="2" fill="#D9C6A5"/></svg>
 <svg class="bush" style="left:8%;top:${TOP+STEP*4.5}px" width="46" height="40" viewBox="0 0 46 40"><path d="M23 2 40 30H6z" fill="#B8E7CF"/><rect x="20" y="30" width="6" height="8" rx="2" fill="#D9C6A5"/></svg>
 <svg class="bush" style="left:74%;top:${TOP+STEP*6.5}px" width="52" height="34" viewBox="0 0 52 34"><circle cx="14" cy="22" r="12" fill="#B8E7CF"/><circle cx="30" cy="18" r="15" fill="#CBEEDC"/><circle cx="43" cy="24" r="9" fill="#B8E7CF"/></svg>
 <svg class="bush" style="left:12%;top:${TOP+STEP*8.4}px" width="40" height="24" viewBox="0 0 40 24"><ellipse cx="12" cy="16" rx="10" ry="7" fill="#CBEEDC"/><ellipse cx="27" cy="14" rx="11" ry="9" fill="#B8E7CF"/></svg>`;
 const nodes=lessons().slice(start,start+10).map((l,i)=>{const idx=start+i, done=S.done.includes(idx), curN=idx===S.next, locked=!done&&idx>S.next; const x=XS[i], y=TOP+i*STEP;
  const inner=done?icon('check'):locked?icon('lock'):String(idx+1).padStart(2,'0');
  const cat=curN?`<span class="trail-cat" style="left:${x+(x<=50?15:-15)}%;top:${y-6}px">${catSVG(S.cat,'idle',44)}</span>`:'';
  return `<button class="node ${done?'done':''} ${curN?'current':''} ${locked?'locked':''}" style="left:${x}%;top:${y}px" onclick="${locked?`toast(t('lockedToast'))`:`startLesson(${idx})`}" aria-label="${esc(l.title)}">${inner}</button><span class="node-label ${locked?'lk':''}" style="left:${x}%;top:${y+38}px">${esc(l.short)}</span>${cat}`}).join('');
 const flag=`<svg class="unit-flag" style="left:50%;top:${TOP+9*STEP+52}px" width="40" height="46" viewBox="0 0 40 46"><rect x="18" y="4" width="4" height="40" rx="2" fill="#B9A98E"/><path d="M22 6h14l-4 5 4 5H22z" fill="#F46D82"/></svg>`;
 app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><div class="map-head"><h2>${t('mapTitle')}</h2><p>${t('mapCopy')}</p></div><div class="unit-tabs"><button class="${S.unit===0?'on':''}" onclick="S.unit=0;renderMap()">01 Basics</button><button class="${S.unit===1?'on':''}" onclick="S.unit=1;renderMap()">02 Control</button><button class="${S.unit===2?'on':''}" onclick="S.unit=2;renderMap()">03 Build</button></div><div class="trail" style="height:${H}px">${deco}${stones}${nodes}${flag}</div></div>${tabs('map')}</div>`}
function renderLeague(){const bots=[['Mina',180],['Yen',140],['Noa',112],['Jin',86],['Leo',43]]; const rows=[...bots,{0:'Me',1:S.xp}].map(x=>Array.isArray(x)?{n:x[0],xp:x[1]}:{n:x[0],xp:x[1]}).sort((a,b)=>b.xp-a.xp).map((r,i)=>`<div class="lrow"><span class="rank">${i+1}</span><span class="avatar">${esc(r.n[0])}</span><span class="name">${esc(r.n)}</span><span class="xp">${r.xp} XP</span></div>`).join(''); app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><div class="simple-head"><h2>${t('leagueTitle')}</h2><p>${t('leagueCopy')}</p></div><div class="lrows">${rows}</div></div>${tabs('league')}</div>`}
function renderRoom(){const names={a:['Soft Icon','가장 안전한 기본안'],b:['Dream Sticker','조금 더 말랑한 스티커형'],c:['Clean Mark','로고처럼 가장 세련된 안']}; const cards=['a','b','c'].map(k=>`<div class="cat-card"><div class="cat-card-head">${catSVG(k,'idle',88)}<div><h3>${names[k][0]}</h3><p>${names[k][1]}</p></div></div><button class="btn ${S.cat===k?'':'ghost'}" onclick="S.cat='${k}';save();renderRoom()">${S.cat===k?'Selected':t('select')}</button></div>`).join(''); app.innerHTML=`<div class="screen">${brand()}${stats()}<div class="scroll"><div class="simple-head"><h2>${t('roomTitle')}</h2><p>${t('roomCopy')}</p></div><div class="room-grid">${cards}</div></div>${tabs('room')}</div>`}
function langSheet(){overlay(`<h3>${t('chooseLang')}</h3><p>Meowde supports Korean and English lesson copy.</p><div class="grid2"><button class="btn" onclick="S.lang='ko';closeOverlay();renderHome()">한국어</button><button class="btn ghost" onclick="S.lang='en';closeOverlay();renderHome()">English</button></div>`)}
function overlay(html){let d=document.createElement('div');d.className='sheet';d.id='overlay';d.innerHTML=`<div class="panel">${html}</div>`;app.appendChild(d)}function closeOverlay(){const o=document.getElementById('overlay');if(o)o.remove()}function toast(msg){document.querySelectorAll('.toast').forEach(x=>x.remove());const d=document.createElement('div');d.className='toast';d.textContent=msg;app.appendChild(d);setTimeout(()=>d.remove(),2100)}
async function warmPy(){if(pyReady||pyLoading||typeof loadPyodide==='undefined')return;pyLoading=true; const origError=console.error, origWarn=console.warn; let warnCount=0;
 const filter=(...a)=>{const s=String(a[0]||''); if(s.includes('wasm instantiation failed')||s.includes('DataCloneError')||s.includes('URL object could not be cloned'))warnCount++; else origError(...a)};
 try{console.error=filter;console.warn=filter;pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.28.0/full/'});pyReady=true}catch(e){
 try{delete WebAssembly.instantiateStreaming;delete WebAssembly.compileStreaming;pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.28.0/full/'});pyReady=true}catch(e2){}}
 finally{console.error=origError;console.warn=origWarn;pyLoading=false;if(S.screen==='home')renderHome()}}
function useMilk(){return true}
function startDaily(){startLesson(Math.max(0,S.next-1),true)}
function startLesson(i,daily=false){if(!useMilk())return;S.lessonIndex=Math.max(0,Math.min(i,lessons().length-1));S.queue=lessons()[S.lessonIndex].exercises.map(e=>Object.assign({},e));S.idx=0;S.combo=0;S.maxCombo=0;S.firstTotal=S.queue.filter(e=>e.type!=='concept').length;S.firstCorrect=0;S.xpEarned=0;S.daily=!!daily;setup();save();renderLesson()}
function cur(){return S.queue[S.idx]}function setup(){S.sel=null;S.fill=null;S.checked=false;S.correct=false;S.loading=false;S.hint=false;S.output=''}
function renderLesson(){if(!hasLessonProgress())return renderHome();S.screen='lesson';save();const ex=cur(), L=lessons()[S.lessonIndex], pct=Math.round(S.idx/S.queue.length*100);const qcode=`${String(S.lessonIndex+1).padStart(2,'0')}-${String(S.idx+1).padStart(2,'0')} · ${ex.id||'concept'}`; let body='', qhead=''; if(ex.type!=='concept')qhead=`<div class="coach">${catSVG(S.cat,S.checked?(S.correct?'happy':'oops'):'focus',68)}<div class="bubble"><div style="font-size:10.5px;font-weight:950;letter-spacing:.08em;color:var(--muted);margin-bottom:7px;text-transform:uppercase">Q ${esc(qcode)}</div><div class="prompt">${esc(ex.prompt)}</div>${S.hint?`<div class="hint">${esc(ex.hint)}</div>`:`<button class="hint" onclick="S.hint=true;save();renderLesson()">${t('hint')}</button>`}</div></div>`; if(ex.type==='concept'){qhead=`<div class="coach">${catSVG(S.cat,'idle',68)}<div class="bubble"><div class="prompt">${t('conceptCoach')}</div></div></div>`;body=`<div class="card"><div class="pill" style="display:inline-flex;margin-bottom:10px">Q ${esc(qcode)}</div><h3>${esc(ex.title)}</h3><p style="font-size:14px;color:var(--muted);line-height:1.6;margin:8px 0 12px">${esc(ex.body)}</p><div class="code">${esc(ex.code)}</div></div>`} else if(ex.type==='predict'){body=`<div class="code">${esc(ex.code)}</div><div class="choices">${ex.choices.map((c,i)=>`<button class="choice ${S.sel===i?'sel':''} ${S.checked&&i===ex.answer?'right':''} ${S.checked&&S.sel===i&&i!==ex.answer?'wrong':''}" onclick="S.sel=${i};save();renderLesson()">${esc(c)}</button>`).join('')}</div>${S.checked&&S.correct?`<div class="console">${esc(ex.output)}</div>`:''}` } else if(ex.type==='fill'){body=`<div class="card fillcode">${esc(ex.code).replace('____',`<span class="blank ${S.fill?'filled':''}">${S.fill?esc(S.fill):''}</span>`)}</div><div class="tokens">${ex.tokens.map(tok=>`<button class="token ${S.fill===tok?'used':''}" onclick="S.fill='${esc(tok)}';save();renderLesson()">${esc(tok)}</button>`).join('')}</div>`} else if(ex.type==='bughunt'){body=`<div class="lines">${ex.lines.map((ln,i)=>`<button class="linebtn ${S.sel===i?'sel':''} ${S.checked&&i===ex.buggy?'right':''}" onclick="S.sel=${i};save();renderLesson()">${i+1}. ${esc(ln)}</button>`).join('')}</div>${S.checked?`<div class="fix">FIX: ${esc(ex.fixed)}</div>`:''}` } else if(ex.type==='write'){body=`<textarea class="codearea" spellcheck="false" oninput="S.write=this.value;save()">${esc(S.write||ex.starter)}</textarea><div class="pill" style="margin-top:10px">${esc(ex.testcase)}</div>${S.output?`<div class="console">${esc(S.output)}</div>`:''}`}
 const can = ex.type==='concept'||S.checked||S.loading?true:(ex.type==='predict'||ex.type==='bughunt'?S.sel!==null:ex.type==='fill'?!!S.fill:true); const foot= ex.type==='concept'?`<div class="lesson-foot"><button class="btn" onclick="nextQ()">${t('got')}</button></div>`:S.checked?`<div class="feedback ${S.correct?'ok':'no'}"><h3>${S.correct?t('correct'):t('wrong')}</h3><p>${esc(ex.explain)} ${!S.correct?t('tryAgain'):''}</p><button class="btn" onclick="nextQ()">${t('continue')}</button></div>`:`<div class="lesson-foot"><button class="btn" ${!can?'disabled':''} onclick="checkQ()">${ex.type==='write'?(S.loading?t('pyLoading'):t('run')):t('check')}</button></div>`; app.innerHTML=`<div class="screen"><div class="lesson-bg"></div>${brand()}<div class="lesson-top"><button class="close" onclick="renderHome()">×</button><div class="lesson-title"><b>${esc(L.title)}</b><div class="progress"><span style="width:${pct}%"></span></div></div><span class="pill">Combo ${S.combo}</span></div><div class="scroll"><main class="lesson-main">${qhead}${body}</main></div>${foot}</div>`}
async function runPython(code){await warmPy(); if(!pyodide) throw new Error('no pyodide'); pyodide.runPython('import sys, io\nsys.stdout = io.StringIO()'); try{pyodide.runPython(code)}catch(e){return 'ERROR: '+e.message} return pyodide.runPython('sys.stdout.getvalue()').trimEnd()}
async function checkQ(){const ex=cur(); let ok=false; if(ex.type==='predict')ok=S.sel===ex.answer; else if(ex.type==='fill')ok=S.fill===ex.answer; else if(ex.type==='bughunt')ok=S.sel===ex.buggy; else if(ex.type==='write'){S.loading=true;renderLesson(); let code=S.write||ex.starter; try{S.output=await runPython(code); ok=S.output.trim()===String(ex.expected).trim()}catch(e){S.output=t('engineError');ok=false}} S.loading=false;S.checked=true;S.correct=ok;if(ok){S.combo++;S.maxCombo=Math.max(S.maxCombo,S.combo);S.xpEarned+=(S.daily?20:10)+(S.combo>=3?5:0);S.firstCorrect++}else{S.combo=0; if(!ex.retry){S.queue.push(Object.assign({},ex,{retry:true}))}}renderLesson()}
function nextQ(){S.idx++;S.write=''; if(S.idx>=S.queue.length)return finish(); setup(); save(); renderLesson()}
function finish(){const finishedLessonIndex=S.lessonIndex, earned=S.xpEarned, maxCombo=S.maxCombo, acc=Math.round((S.firstCorrect/Math.max(1,S.firstTotal))*100), churuEarned=Math.max(1,Math.round(earned/10)+Math.floor(maxCombo/2));if(!S.done.includes(finishedLessonIndex)){S.done.push(finishedLessonIndex);S.done.sort((a,b)=>a-b);S.next=Math.min(lessons().length-1,S.done.length)}S.xp+=earned;S.churu+=churuEarned;clearLessonProgress();S.lessonIndex=finishedLessonIndex;save();const treatLabel=S.lang==='ko'?'츄르':'Churu';app.innerHTML=`<div class="screen"><div class="reward-screen">${catSVG(S.cat,'happy',116)}<h2>${t('lessonDone')}</h2><p class="pill">${esc(lessons()[finishedLessonIndex].title)}</p><div class="stats3"><div class="stat3"><b>+${earned}</b><p>XP</p></div><div class="stat3"><b>+${churuEarned}</b><p>${treatLabel}</p></div><div class="stat3"><b>${acc}%</b><p>${t('accuracy')}</p></div></div><p style="margin-top:14px;font-size:13px;color:var(--muted);line-height:1.5">${S.lang==='ko'?'츄르는 학습을 막는 재화가 아니라 레슨 완료 보상이에요.':'Churu is a completion reward, not an energy gate.'}</p></div><div class="lesson-foot"><button class="btn" onclick="renderMap()">${t('reward')}</button></div></div>`}
const app=document.getElementById('app');if(hasLessonProgress())renderLesson();else renderHome();if(!localStorage.getItem('meowde-v410-seen')){localStorage.setItem('meowde-v410-seen','1');setTimeout(()=>langSheet(),300)}
</script></body></html>
