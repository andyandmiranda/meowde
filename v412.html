<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meowde v4.12 — Loading</title>
<style>
html,body{height:100%;margin:0}body{display:grid;place-items:center;background:#fff9ef;color:#2d2a28;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.loading{font-weight:800;letter-spacing:-.02em}.error{max-width:320px;padding:24px;text-align:center;line-height:1.6}
</style>
</head>
<body><div class="loading" id="status">Meowde를 준비하고 있어요…</div>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    const saved=localStorage.getItem('meowde-v410-state');
    if(saved){try{JSON.parse(saved)}catch(error){localStorage.removeItem('meowde-v410-state')}}
    const response=await fetch('/index.html?v=411',{cache:'no-store'});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    let html=await response.text();
    html=html.replace('<title>Meowde v4.11 — Unlimited Practice</title>','<title>Meowde v4.12 — Progress Hotfix</title>');
    html=html.replace('</body>','<script src="/v412-hotfix.js?v=412"><\/script></body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    console.error('Meowde v4.12 bootstrap failed',error);
    status.className='error';
    status.textContent='Meowde를 불러오지 못했습니다. 잠시 후 다시 접속해 주세요.';
  }
})();
</script>
</body>
</html>
